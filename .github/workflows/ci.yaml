name: Distributed Banking CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install Dependencies
      run: |
        pip install flask

    - name: Run User Service
      run: python user-service/app.py

    - name: Run Payment Service
      run: python payment-service/app.py

    - name: Run Transaction Service
      run: python transaction-service/app.py